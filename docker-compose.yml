services:
  postgres:
    image: postgres:16-alpine
    container_name: agendafacil-postgres
    environment:
      POSTGRES_DB: agendafacil
      POSTGRES_USER: agendafacil_user
      POSTGRES_PASSWORD: agendafacil_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agendafacil-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: