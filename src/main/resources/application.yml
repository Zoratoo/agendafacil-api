spring:
    application:
        name: agendafacil-api

    docker:
        compose:
            enabled: false

    datasource:
        url: ${DATABASE_URL}
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}
        driver-class-name: org.postgresql.Driver

    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}

    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true

jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}

server:
    port: ${PORT:8080}